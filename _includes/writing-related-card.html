<article class="writing-related__card">
  <a href="{{ include.post.url | relative_url }}">
    <span>
      {{ include.post.date | date: "%Y.%m.%d" }}{% if include.post.location %} · {{ include.post.location }}{% endif %}
    </span>
    <h3>{{ include.post.display_title | default: include.post.title }}</h3>
  </a>
</article>
